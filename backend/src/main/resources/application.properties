spring.application.name=ledger

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ledger}
spring.datasource.username=${DB_USER:ledger}
spring.datasource.password=${DB_PASSWORD:ledger}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

server.port=${SERVER_PORT:8080}

management.endpoints.web.exposure.include=health,info

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.fraud.review-threshold=${FRAUD_REVIEW_THRESHOLD:5000}
