services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ledger
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ledger
      DB_USER: ledger
      DB_PASSWORD: ledger
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      FRAUD_REVIEW_THRESHOLD: 5000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Baked in at build time: this runs in the browser, so it must be a
        # URL the host machine (not the compose network) can resolve.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1/ledger
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
